<html lang="ar" dir="rtl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي- كامل الأقسام</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; }
        body {
            background-color: #121026;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1a1835;
            width: 100%;
            max-width: 600px;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid #2a2752;
            text-align: center;
            position: relative; /* عشان الإشعار يظهر جواه مظبوط */
        }
        h1, h2 { color: #f9a826; }
        
        #setup-screen, #category-screen, #game-screen, #winner-screen { display: none; }
        #setup-screen.active, #category-screen.active, #game-screen.active, #winner-screen.active { display: block; }
        
        .input-group { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
        input[type="text"], select {
            flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 1rem;
            background-color: #2a2752; color: white; outline: none;
        }
        .btn {
            background-color: #e94560; color: white; border: none; padding: 12px 20px;
            font-size: 1.1rem; font-weight: bold; border-radius: 10px; cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { background-color: #d83a56; transform: scale(1.05); }
        .btn-full { width: 100%; margin-top: 15px; background-color: #f9a826; color: #121026; }
        .btn-full:hover { background-color: #e69515; }
        
        .players-list { list-style: none; padding: 0; margin: 15px 0; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .player-badge { background-color: #2a2752; padding: 8px 15px; border-radius: 20px; font-weight: bold; }
        
        .categories-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px; margin-top: 20px; max-height: 60vh; overflow-y: auto; padding-right: 5px;
        }
        .cat-card {
            background-color: #2a2752; border-radius: 15px; padding: 20px 10px;
            cursor: pointer; transition: 0.3s; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border: 3px solid transparent;
        }
        .cat-card:hover { transform: translateY(-5px); background-color: #353163; }
        .cat-card.selected {
            border-color: #4caf50; background-color: #1f3b2b; 
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.4); transform: scale(1.03);
        }
        .cat-icon { font-size: 3rem; margin-bottom: 10px; }
        .cat-title { font-size: 1rem; font-weight: bold; color: #ddd; text-align: center; }
        
        .scoreboard {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
            background-color: #2a2752; padding: 15px; border-radius: 10px; margin-bottom: 20px;
        }
        .score-card { background-color: #121026; padding: 10px; border-radius: 8px; min-width: 80px; font-weight: bold; border: 1px solid transparent; }
        .active-player-card { border-color: #4caf50; background-color: #1e2a38; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .turn-box { background-color: #f9a826; color: #121026; padding: 10px 20px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; flex: 1; text-align: center; }
        .lang-switch { margin-right: 10px; background-color: #2a2752; color: white; border: 1px solid #f9a826; padding: 10px; border-radius: 8px; outline: none; font-weight: bold; cursor: pointer; }
        
        .question-text { font-size: 1.4rem; margin-bottom: 15px; line-height: 1.5; transition: 0.3s; }
        .answer-box {
            background-color: #1e2a38; padding: 15px; margin-bottom: 25px; border-radius: 5px;
            font-size: 1.2rem; color: #4caf50; font-weight: bold; transition: 0.3s;
        }
        
        .judge-controls { display: flex; gap: 15px; margin-bottom: 10px; }
        .btn-correct { background-color: #4caf50; flex: 1; padding: 15px; font-size: 1.2rem; border-radius: 10px; }
        .btn-wrong { background-color: #f44336; flex: 1; padding: 15px; font-size: 1.2rem; border-radius: 10px;}
        
        .btn-translate { background-color: #3b82f6; width: 100%; padding: 12px; font-size: 1.1rem; border-radius: 10px; color: white; margin-bottom: 10px; transition: 0.3s; }
        .btn-translate:hover { background-color: #2563eb; }
        .btn-translate:disabled { background-color: #9ca3af; cursor: not-allowed; }

        .btn-skip { background-color: #4b5563; width: 100%; padding: 12px; font-size: 1.1rem; border-radius: 10px; color: #d1d5db; transition: 0.3s; }
        .btn-skip:hover { background-color: #6b7280; color: white; }

        .winner-text { font-size: 2.5rem; color: #4caf50; margin: 20px 0; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        
        /* تصميم الإشعار الجديد (Toast) */
        .toast-msg {
            visibility: hidden;
            min-width: 250px;
            background-color: #f9a826;
            color: #121026;
            text-align: center;
            border-radius: 10px;
            padding: 15px;
            position: fixed;
            z-index: 1000;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.5s, top 0.5s;
        }
        .toast-msg.show {
            visibility: visible;
            opacity: 1;
            top: 40px; /* بينزل لتحت شوية بشكل ناعم */
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #121026; }
        ::-webkit-scrollbar-thumb { background: #2a2752; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="toast" class="toast-msg"></div>

    <div class="container">
        
        <div id="setup-screen" class="active">
            <h1>🎮 تحديات عمارة 17</h1>
            <p>سجل أسامي اللعيبة وظبط إعدادات الماتش!</p>
            
            <div class="input-group">
                <input type="text" id="player-input" placeholder="اكتب اسم اللاعب...">
                <button class="btn" onclick="addPlayer()">إضافة</button>
            </div>
            
            <ul class="players-list" id="players-ul"></ul>
            
            <div class="input-group" style="margin-top: 20px;">
                <label style="font-weight: bold; min-width: 90px;">العب لحد:</label>
                <select id="target-score">
                    <option value="10">10 نقط</option>
                    <option value="20">20 نقطة</option>
                    <option value="30">30 نقطة</option>
                </select>
            </div>

            <div class="input-group">
                <label style="font-weight: bold; min-width: 90px;">لغة البداية:</label>
                <select id="setup-lang">
                    <option value="ar">أسئلة عربي</option>
                    <option value="en">أسئلة إنجليزي</option>
                </select>
            </div>
            
            <button class="btn btn-full" onclick="goToCategories()">التالي: اختيار الأقسام ➡️</button>
        </div>

        <div id="category-screen">
            <h2 style="margin-bottom: 5px;">Select Categories</h2>
            <p style="color: #aaa; font-size: 0.9rem; margin-top: 0;">الأقسام دي موحدة للعربي والإنجليزي</p>
            
            <div class="categories-grid" id="categories-container"></div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn" style="background-color: #555; flex: 1;" onclick="goBackToSetup()">⬅️ رجوع</button>
                <button class="btn" id="start-btn" style="background-color: #4caf50; flex: 2;" onclick="startSelectedCategories()">تحميل وبدء اللعب 🚀</button>
            </div>
        </div>

        <div id="game-screen">
            <h3 id="current-category-title" style="color: #aaa; margin-top: 0;">جاري اللعب...</h3>
            <div class="scoreboard" id="scoreboard"></div>
            
            <div class="top-bar">
                <div class="turn-box" id="turn-display">🎤 الدور على: ...</div>
                <select id="in-game-lang" class="lang-switch" onchange="toggleInGameLang()">
                    <option value="ar">عربي 🇪🇬</option>
                    <option value="en">إنجليزي 🇬🇧</option>
                </select>
            </div>

            <div class="question-text" id="question-text">Loading question...</div>
            
            <div class="answer-box">
                <span id="answer-text">...</span>
            </div>
            
            <div class="judge-controls">
                <button class="btn btn-wrong" onclick="judgeAnswer(false)">غلط -1 ❌</button>
                <button class="btn btn-correct" onclick="judgeAnswer(true)">صح +1 ✅</button>
            </div>
            
            <button class="btn btn-translate" id="translate-btn" onclick="translateCurrent()">ترجم للعربي 🌐</button>
            <button class="btn btn-skip" onclick="skipQuestion()">تخطي السؤال ⏭️</button>
        </div>

        <div id="winner-screen">
            <h1>🏆 الفايز بالدستة 🏆</h1>
            <div class="winner-text" id="winner-name">اسم الفايز</div>
            <button class="btn btn-full" onclick="location.reload()">العب من تاني 🔄</button>
        </div>

    </div>

    <script>
        const unifiedCategories = {
            "معلومات عامة": { 
                icon: "🧠", apiId: 9, 
                localAr: [
                    { q: "ما هو أطول نهر في العالم؟", a: "نهر النيل (أو الأمازون)" },
                    { q: "ما هو الكوكب الملقب بالكوكب الأحمر؟", a: "المريخ" },
                    { q: "ما هي عاصمة اليابان؟", a: "طوكيو" },
                    { q: "من هو العالم الذي اكتشف الجاذبية؟", a: "إسحاق نيوتن" },
                    { q: "ما هي أكبر دولة في العالم من حيث المساحة؟", a: "روسيا" }
                ] 
            },
            "أفلام وسينما": { 
                icon: "🎬", apiId: 11, 
                localAr: [
                    { q: "فيلم البطل فيه اسمه 'صلاح' وقال جملة 'الدين المعاملة'؟", a: "الإرهاب والكباب" },
                    { q: "من هو بطل فيلم 'الجزيرة'؟", a: "أحمد السقا" },
                    { q: "من هو بطل فيلم 'همام في أمستردام'؟", a: "محمد هنيدي" },
                    { q: "فيلم شارك فيه أحمد السقا ومنى زكي وسافروا جنوب أفريقيا؟", a: "أفريكانو" }
                ] 
            },
            "أغاني وموسيقى": { 
                icon: "🎵", apiId: 12, 
                localAr: [
                    { q: "أغنية 'يا بتاع النعناع' غناء مين؟", a: "مصطفى حجاج" },
                    { q: "أغنية 'تملي معاك' غناء مين؟", a: "عمرو دياب" },
                    { q: "صاحبة أغنية 'خاصمتك بيني وبين روحي'؟", a: "وردة الجزائرية" },
                    { q: "أغنية 'مخصماك' غناء مين؟", a: "نوال عبد الشافي" }
                ] 
            },
            "تليفزيون ومسلسلات": { 
                icon: "📺", apiId: 14, 
                localAr: [
                    { q: "مسلسل بطولته 'عبد الغفور البرعي'؟", a: "لن أعيش في جلباب أبي" },
                    { q: "مسلسل رمضاني بطولته 'رفاعي الدسوقي'؟", a: "الأسطورة" },
                    { q: "اسم المستشفى في مسلسل 'بالطو'؟", a: "طرشوخ الليف" },
                    { q: "مسلسل كوميدي من أجزاء كتير بطولته أحمد مكي؟", a: "الكبير أوي" }
                ] 
            },
            "رياضة": { 
                icon: "⚽", apiId: 21, 
                localAr: [
                    { q: "من هو الهداف التاريخي لمنتخب مصر؟", a: "حسام حسن" },
                    { q: "أكثر نادي تتويجاً بدوري أبطال أوروبا؟", a: "ريال مدريد" },
                    { q: "ما هو النادي الإنجليزي الذي يلعب له محمد صلاح؟", a: "ليفربول" },
                    { q: "أكثر دولة فازت ببطولة كأس العالم؟", a: "البرازيل" }
                ] 
            },
            "ديني إسلامي": { 
                icon: "🕋", apiId: null, 
                localAr: [
                    { q: "ما هي السورة التي تُسمى بقلب القرآن؟", a: "سورة يس" },
                    { q: "ما هي أول غزوة في الإسلام؟", a: "غزوة الأبواء" },
                    { q: "من هو الصحابي الملقب بـ 'سيف الله المسلول'؟", a: "خالد بن الوليد" },
                    { q: "كم عدد سور القرآن الكريم؟", a: "114 سورة" },
                    { q: "ما هي السورة التي تسمى 'عروس القرآن'؟", a: "سورة الرحمن" }
                ],
                localEn: [
                    { q: "What is the holy month of fasting in Islam?", a: "Ramadan" },
                    { q: "How many pillars of Islam are there?", a: "Five (5)" },
                    { q: "What is the holiest city in Islam?", a: "Mecca" },
                    { q: "Who is the final prophet in Islam?", a: "Prophet Muhammad (PBUH)" },
                    { q: "What is the holy book of Islam called?", a: "The Quran" }
                ]
            },
            "فوازير وألغاز": { 
                icon: "🤔", apiId: null, 
                localAr: [
                    { q: "شيء كلما زاد نقص، فما هو؟", a: "العمر" },
                    { q: "عائلة مؤلفة من 6 بنات وأخ لكل منهن، فكم عدد أفراد العائلة؟", a: "سبعة أشخاص" },
                    { q: "ما هو الشيء الذي لا يمشي إلا بالضرب؟", a: "المسمار" },
                    { q: "تسمعه وتراه ولا يسمعك ولا يراك، فما هو؟", a: "التلفزيون" },
                    { q: "ما هو الشيء الذي إذا غليته جمد؟", a: "البيض" }
                ],
                localEn: [
                    { q: "I have keys but open no doors. What am I?", a: "A piano" },
                    { q: "What has to be broken before you can use it?", a: "An egg" },
                    { q: "I’m tall when I’m young, and I’m short when I’m old. What am I?", a: "A candle" },
                    { q: "What has hands but cannot clap?", a: "A clock" },
                    { q: "What has one eye, but can't see?", a: "A needle" }
                ]
            }
        };

        let arabicQuestions = []; 
        let englishQuestions = [];
        let currentLang = 'ar';
        
        let players = [];
        let targetScore = 10;
        let currentPlayerIndex = 0;
        let selectedCategories = []; 
        let currentDisplayedQuestion = null;

        // دالة عرض الإشعار الذكي بدل الـ alert المزعج
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.classList.add("show");
            
            // بيختفي لوحده بعد 3 ثواني
            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }

        function decodeHTML(html) {
            var txt = document.createElement("textarea");
            txt.innerHTML = html;
            return txt.value;
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.container > div').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function addPlayer() {
            const input = document.getElementById("player-input");
            const name = input.value.trim();
            if (name !== "") {
                players.push({ name: name, score: 0 });
                updatePlayersList();
                input.value = "";
            }
        }

        function updatePlayersList() {
            const ul = document.getElementById("players-ul");
            ul.innerHTML = "";
            players.forEach(player => {
                const li = document.createElement("li");
                li.className = "player-badge";
                li.innerText = player.name;
                ul.appendChild(li);
            });
        }

        function goToCategories() {
            if (players.length < 2) {
                alert("لازم تسجل على الأقل 2 لعيبة!");
                return;
            }
            targetScore = parseInt(document.getElementById("target-score").value);
            currentLang = document.getElementById("setup-lang").value;
            
            renderCategories();
            switchScreen('category-screen');
        }

        function goBackToSetup() {
            switchScreen('setup-screen');
        }

        function renderCategories() {
            const container = document.getElementById("categories-container");
            container.innerHTML = "";
            
            for (const category in unifiedCategories) {
                const catData = unifiedCategories[category];
                const card = document.createElement("div");
                card.className = "cat-card";
                if (selectedCategories.includes(category)) card.classList.add("selected");

                card.innerHTML = `
                    <div class="cat-icon">${catData.icon}</div>
                    <div class="cat-title">${category}</div>
                `;
                card.onclick = () => toggleCategory(category, card);
                container.appendChild(card);
            }
        }

        function toggleCategory(category, cardElement) {
            const index = selectedCategories.indexOf(category);
            if (index > -1) {
                selectedCategories.splice(index, 1);
                cardElement.classList.remove('selected');
            } else {
                selectedCategories.push(category);
                cardElement.classList.add('selected');
            }
        }

        async function startSelectedCategories() {
            if (selectedCategories.length === 0) {
                alert("اختار قسم واحد على الأقل يا بطل!");
                return;
            }

            const startBtn = document.getElementById("start-btn");
            startBtn.innerText = "جاري تحضير الأسئلة... ⏳";
            startBtn.disabled = true;

            arabicQuestions = [];
            englishQuestions = [];

            selectedCategories.forEach(cat => {
                arabicQuestions = arabicQuestions.concat(unifiedCategories[cat].localAr);
            });
            arabicQuestions = arabicQuestions.sort(() => Math.random() - 0.5);

            for (const cat of selectedCategories) {
                const apiId = unifiedCategories[cat].apiId;
                
                if (apiId !== null) {
                    try {
                        const response = await fetch(`https://opentdb.com/api.php?amount=10&category=${apiId}&type=multiple`);
                        const data = await response.json();
                        const formattedQuestions = data.results.map(item => ({
                            q: decodeHTML(item.question),
                            a: decodeHTML(item.correct_answer)
                        }));
                        englishQuestions = englishQuestions.concat(formattedQuestions);
                    } catch (error) {
                        console.error("خطأ في تحميل الأسئلة الإنجليزي:", error);
                    }
                } else {
                    englishQuestions = englishQuestions.concat(unifiedCategories[cat].localEn);
                }
            }
            englishQuestions = englishQuestions.sort(() => Math.random() - 0.5);

            document.getElementById("in-game-lang").value = currentLang;

            startBtn.innerText = "تحميل وبدء اللعب 🚀";
            startBtn.disabled = false;
            
            switchScreen('game-screen');
            updateScoreboard();
            loadNextQuestion();
        }

        function toggleInGameLang() {
            currentLang = document.getElementById("in-game-lang").value;
            loadNextQuestion(); 
        }

        function updateScoreboard() {
            const board = document.getElementById("scoreboard");
            board.innerHTML = "";
            players.forEach((player, index) => {
                const div = document.createElement("div");
                div.className = index === currentPlayerIndex ? "score-card active-player-card" : "score-card";
                div.innerHTML = `${player.name} <br><span style="color:#f9a826; font-size:1.2rem;">${player.score}</span>`;
                board.appendChild(div);
            });
        }

        function loadNextQuestion() {
            let activePool = currentLang === 'ar' ? arabicQuestions : englishQuestions;

            // هنا استبدلنا الـ alert المزعج بالـ Toast
            if (activePool.length === 0) {
                if (currentLang === 'en') {
                    showToast("الأسئلة الإنجليزي خلصت! هنقلب على الأسئلة العربي 🔄");
                    currentLang = 'ar';
                    document.getElementById("in-game-lang").value = 'ar';
                    activePool = arabicQuestions;
                } else {
                    showToast("أسئلة ممتعة! هنعيد خلط الأسئلة العربي تاني 🔄");
                    selectedCategories.forEach(cat => {
                        arabicQuestions = arabicQuestions.concat(unifiedCategories[cat].localAr);
                    });
                    arabicQuestions = arabicQuestions.sort(() => Math.random() - 0.5);
                    activePool = arabicQuestions;
                }
            }
            
            const currentQ = activePool.pop(); 
            currentDisplayedQuestion = currentQ;

            updateScoreboard();
            document.getElementById("turn-display").innerText = `🎤 الدور على: ${players[currentPlayerIndex].name}`;
            
            const qEl = document.getElementById("question-text");
            const aEl = document.getElementById("answer-text");
            const transBtn = document.getElementById("translate-btn");

            if (currentLang === 'ar') {
                qEl.style.direction = "rtl"; qEl.style.textAlign = "right";
                aEl.parentElement.style.direction = "rtl"; aEl.parentElement.style.textAlign = "right";
                aEl.parentElement.style.borderRight = "5px solid #4caf50"; aEl.parentElement.style.borderLeft = "none";
                aEl.innerHTML = `الإجابة: <span style="color:white;">${currentQ.a}</span>`;
                transBtn.style.display = "none"; 
            } else {
                qEl.style.direction = "ltr"; qEl.style.textAlign = "left";
                aEl.parentElement.style.direction = "ltr"; aEl.parentElement.style.textAlign = "left";
                aEl.parentElement.style.borderLeft = "5px solid #4caf50"; aEl.parentElement.style.borderRight = "none";
                aEl.innerHTML = `Answer: <span style="color:white;">${currentQ.a}</span>`;
                transBtn.style.display = "block"; 
            }
            qEl.innerText = currentQ.q;
        }

        async function translateCurrent() {
            if (!currentDisplayedQuestion || currentLang === 'ar') return;

            const transBtn = document.getElementById("translate-btn");
            transBtn.innerText = "جاري الترجمة... ⏳";
            transBtn.disabled = true;

            try {
                const qRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(currentDisplayedQuestion.q)}&langpair=en|ar`);
                const qData = await qRes.json();
                const translatedQ = qData.responseData.translatedText;

                const aRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(currentDisplayedQuestion.a)}&langpair=en|ar`);
                const aData = await aRes.json();
                const translatedA = aData.responseData.translatedText;

                const qEl = document.getElementById("question-text");
                const aEl = document.getElementById("answer-text");

                qEl.innerText = translatedQ;
                qEl.style.direction = "rtl"; qEl.style.textAlign = "right";

                aEl.parentElement.style.direction = "rtl"; aEl.parentElement.style.textAlign = "right";
                aEl.parentElement.style.borderRight = "5px solid #4caf50"; aEl.parentElement.style.borderLeft = "none";
                aEl.innerHTML = `الإجابة (مترجمة): <span style="color:white;">${translatedA}</span>`;
                
                transBtn.style.display = "none"; 

            } catch (error) {
                showToast("حصلت مشكلة في الترجمة! اتأكد من النت 📶");
            }
            transBtn.innerText = "ترجم للعربي 🌐";
            transBtn.disabled = false;
        }

        function judgeAnswer(isCorrect) {
            if (isCorrect) players[currentPlayerIndex].score += 1;
            else players[currentPlayerIndex].score -= 1;

            if (players[currentPlayerIndex].score >= targetScore) {
                showWinner(players[currentPlayerIndex].name);
            } else {
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
                loadNextQuestion();
            }
        }

        function skipQuestion() {
            loadNextQuestion(); 
        }

        function showWinner(winnerName) {
            switchScreen('winner-screen');
            document.getElementById("winner-name").innerText = winnerName;
        }
    </script>

</body></html>
